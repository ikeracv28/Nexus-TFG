version: "3.8"

# =========================================================================
# ORQUESTADOR MAESTRO - NEXUS TFG
# =========================================================================
# Este archivo centraliza el despliegue de toda la arquitectura:
# BD (Postgres) + Backend (Spring) + Frontend (Flutter).
# =========================================================================

services:
  # 1. BASE DE DATOS (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: nexus-db
    restart: unless-stopped
    ports:
      - "${DB_PORT}:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - nexus-db-data:/var/lib/postgresql/data
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. BACKEND (Spring Boot API)
  backend:
    build:
      context: ./backend/tfg-nexus-api
      dockerfile: Dockerfile
    container_name: nexus-api
    ports:
      - "${SPRING_PORT}:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_FLYWAY_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - SPRING_FLYWAY_USER=${DB_USER}
      - SPRING_FLYWAY_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nexus-network

  # 3. FRONTEND (Flutter Web)
  # Usamos el Dockerfile multi-etapa para servir la web optimizada con Nginx.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-web
    ports:
      - "${FLUTTER_PORT}:80"
    depends_on:
      - backend
    networks:
      - nexus-network

# -------------------------------------------------------------------------
# REDES Y VOLÚMENES
# -------------------------------------------------------------------------
networks:
  nexus-network:
    driver: bridge

volumes:
  nexus-db-data:
    driver: local
