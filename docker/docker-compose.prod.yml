version: "3.8"

# =========================================================================
# ORQUESTACIÓN DE CONTENEDORES (DOCKER COMPOSE) - ENTORNO PRODUCCIÓN
# =========================================================================

services:
  db:
    image: postgres:15-alpine
    container_name: tfg-postgres-db-prod
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
      - ../BBDD-TFG.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tfg-network-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tfg-springboot-api-prod
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - tfg-network-prod
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: tfg-flutter-web-prod
    restart: always
    ports:
      - "3000:80"
    networks:
      - tfg-network-prod
    depends_on:
      - backend

networks:
  tfg-network-prod:
    driver: bridge

volumes:
  postgres-data-prod:
    driver: local
