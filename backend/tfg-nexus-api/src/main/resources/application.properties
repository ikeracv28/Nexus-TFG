# Configuración de Servidor
server.port=8080

# Configuración de Base de Datos (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tfg_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# 'none' o 'validate' es lo ideal cuando usamos Flyway para no interferir con las migraciones manuales.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway: Habilitar migraciones automáticas
spring.flyway.enabled=true
# Si la base de datos ya tiene tablas y quieres empezar a usar Flyway:
spring.flyway.baseline-on-migrate=true

# Logging: Nivel de depuración para ver qué ocurre en el backend.
logging.level.com.tfg.api=WARN
logging.level.org.springframework.security=WARN
