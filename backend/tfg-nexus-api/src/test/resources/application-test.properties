# Propiedades de configuración para entorno de TEST
spring.datasource.url=jdbc:h2:mem:tfgtest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway en modo test (Desactivado para evitar errores de sintaxis Postgres en H2)
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT — Base64 obligatorio tras el fix A02. Decodes to 'secretkeyfortfgnexus2026securedevelopment' (40 bytes)
JWT_SECRET=c2VjcmV0a2V5Zm9ydGZnbmV4dXMyMDI2c2VjdXJlZGV2ZWxvcG1lbnQ=

# Logs minimalistas para tests
logging.level.org.springframework=WARN
logging.level.com.tfg=DEBUG
