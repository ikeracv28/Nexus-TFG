server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # index.html y service worker: nunca cachear
    location ~* (index\.html|flutter_service_worker\.js|flutter_bootstrap\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # main.dart.js: revalidar siempre con el servidor (ETag/Last-Modified)
    location ~* (main\.dart\.js|main\.dart\.js\.map)$ {
        add_header Cache-Control "no-cache";
        expires 0;
    }

    # Assets con hash en el nombre: cacheables 1 año
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
